<!DOCTYPE html>
<html>
  <head>
    <title>Mintmade Fashion</title>
    <script src="../scripts/load_header_and_footer.js" defer></script>
    <script src="../scripts/load_filters.js" defer></script>
    <link rel="stylesheet" href="../styles/searching_styles.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="main">
      <span id="filters-container"></span>

      <span id="tiles">
        <!-- Kafelki z produktami -->
        <a href="./product1.html" class="product-link">
          <div class="product-tile">
            <!-- Popup -->
            <div class="product-popup">
              <p>Extra product details go here!</p>
            </div>

            <div class="product-content">
              <img
                src="../img/product1.png"
                alt="KOSZULKA BASIC"
                class="product-image"
              />
              <div class="product-info">
                <h3 class="product-name">KOSZULKA BASIC</h3>

                <p class="product-price">45,99 zł</p>
                <div class="colors">
                  <span
                    class="color-option"
                    style="background-color: #000"
                  ></span>
                  <span
                    class="color-option"
                    style="background-color: #33a8ff"
                  ></span>
                  <span
                    class="color-option"
                    style="background-color: #ff4b4b"
                  ></span>
                  <span
                    class="color-option"
                    style="background-color: #8a33ff"
                  ></span>
                  <span
                    class="color-option"
                    style="background-color: #888"
                  ></span>
                </div>
              </div>
            </div>
          </div>
        </a>

        <!-- Dodaj więcej kafelków z produktami tutaj -->
      </span>
    </main>
    <div id="footer-container"></div>

    <script src="../scripts/searching_script.js" defer></script>
  </body>
</html>
